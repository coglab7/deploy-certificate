name: Keep Repositories Alive

on:
  schedule:
    - cron: "0 0 1 * *"   # 每月 1 号 00:00 UTC
  workflow_dispatch:

permissions:
  actions: write

jobs:
  alive:
    runs-on: ubuntu-latest
    steps:
      - name: Re-enable this workflow (keep Actions scheduled runs alive)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api -X PUT "repos/${{ github.repository }}/actions/workflows/action.yml/enable"
          gh api -X PUT "repos/${{ github.repository }}/actions/workflows/keep-alive.yml/enable"
